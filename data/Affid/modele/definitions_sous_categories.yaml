Facturation-Cotation CCAM: "Problèmes liés aux codes CCAM (Classification Commune des Actes Médicaux), tarification, base tarif, codes QZM, QAMA et autres codes de la nomenclature CCAM."
Facturation-Exoneration (EXO, ALD, C2S): "Problèmes d'exonération du ticket modérateur : ALD (Affection Longue Durée), C2S (Couverture Maladie Universelle Complémentaire), codes exonération, prise en charge 100% AMO."
Facturation-Cotation IVG: "Problèmes spécifiques à la facturation des IVG (Interruption Volontaire de Grossesse), codes FMV, grossesse, délai de 6 semaines, tarification spéciale."
Facturation-Teleconsultation: "Problèmes de téléconsultation, codes TCS, tarification à 50 euros, consultation à distance, actes de télémedecine."
Facturation-Majoration: "Problèmes de majorations : MD (Majoration Dépassement), VSP (Visite Samedi/Dimanche), MN (Majoration Nocturne), MM (Majoration Multiple), hors garde."
Facturation-PAV: "Problèmes de PAV (Participation Forfaitaire), patient hospitalisé, montant de 24 euros, participation obligatoire."
Facturation-ALD: "Problèmes spécifiques aux ALD (Affection Longue Durée), prise en charge 100% AMO, protocoles de soins, exonération du ticket modérateur."
Facturation-Association d'actes: "Problèmes d'association d'actes, séries d'actes, kinésithérapie, orthophonie, cumul d'actes, règles d'association."
Facturation-Dépassement: "Problèmes de dépassements d'honoraires, médecins conventionnés, OPTAM, dépassements autorisés, honoraires libres."
Facturation-Cotation SF: "Problèmes de cotation SF (Séance de Soins), codes SF, montants 16.5 et 7.5 euros, soins infirmiers."
Facturation-Patient etranger: "Problèmes de patients étrangers, sécurité sociale étrangère, carte vitale, demandeur d'asile, prise en charge internationale."
Facturation-Taux de prise en charge: "Problèmes de taux de remboursement, FSE (Fonds de Solidarité Européen), pourcentage de prise en charge, calcul des remboursements."
Facturation-Cotation maternité: "Problèmes de facturation maternité, grossesse gémellaire, prise en charge 70%, actes de suivi de grossesse."
Facturation-MT/DMT: "Problèmes de MT/DMT (Discipline Médico-Tarifaire), CPAM, classification des actes, tarification par discipline."
Facturation-SNCF: "Problèmes spécifiques à la SNCF, médecins agréés SNCF, tarification spéciale, actes pour le personnel SNCF."
Facturation-Dégradé: "Problèmes de feuilles de soins dégradées, numéro de sécurité sociale manquant, sans carte vitale, documents incomplets."
Facturation-Soins Anonyme: "Problèmes de soins anonymes, feuilles de soins anonymisées, actes sans identification patient, anonymisation." 